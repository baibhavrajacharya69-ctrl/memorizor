<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Simon Says Game</title>
</head>
<body>
    <h1>Simon Says</h1>
    <div id="game-container">
    <div class="pad" id="green" data-color="green"></div>
    <div class="pad" id="red" data-color="red"></div>
    <div class="pad" id="yellow" data-color="yellow"></div>
    <div class="pad" id="blue" data-color="blue"></div>
    <div class="pad" id="orange" data-color="orange"></div>
    <div class="pad" id="purple" data-color="purple"></div>
</div>
    <div id="status">Press any key to start</div>
    <button id="start-btn">Start Game</button>
    <script src="script.js"></script>
</body>
</html>
